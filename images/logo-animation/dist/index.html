<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo Mark Animation</title>
    <script type="module" crossorigin src="./assets/index-DmWXbYkl.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-2AzIFV2-.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Transparent WebGL Preview</p>
        <h1 class="app-title">Logo Mark Animation</h1>
        <p class="app-copy">
          Exact mark geometry from <code>Logo.svg</code>, glass material shading,
          motion-safe controls, and a fallback path when WebGL is unavailable.
        </p>
      </header>

      <main class="stage-shell" data-surface="checker">
        <div class="stage-caption">Transparency Check</div>
        <div id="logo-wrap" class="logo-wrap"></div>
      </main>

      <section class="toolbar" aria-label="Animation controls">
        <div class="toolbar-row">
          <div class="button-group">
            <button type="button" data-mode="both">Both</button>
            <button type="button" data-mode="rotate">Rotate</button>
            <button type="button" data-mode="shine">Shine</button>
            <button type="button" data-mode="none">Static</button>
            <button type="button" id="btn-pause" data-paused="false">Pause</button>
          </div>

          <label>
            Tint
            <input id="color-input" type="color" value="#2135ff" />
          </label>
        </div>

        <div class="toolbar-row">
          <div class="surface-group">
            <button type="button" data-surface="checker">Checker</button>
            <button type="button" data-surface="light">Light</button>
            <button type="button" data-surface="dark">Dark</button>
          </div>

          <p id="status" class="status">Loading</p>
        </div>
      </section>
    </div>

  </body>
</html>
